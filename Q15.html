<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p> Count : <span id="count">0</span></p>

<button onclick="inc()"> Add Trancsation </button>
<button onclick="dec()"> Delete Trancsation </button>
<button onclick="reset()">Reset Trancsation </button>

<script>
let count = 0;

  function inc(){
            count++;
            document.getElementById("count").textContent=count
        }

function dec(){
    count--;
    document.getElementById("count").textContent=count
}

function reset(){
    count=0;
    document.getElementById("count").textContent=count
}

</script>
</body>
</html>
